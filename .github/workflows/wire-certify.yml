name: Wire Certification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  certify-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MCP dependency
        run: pip install mcp numpy

      - name: Verify wire laws and regenerate golden vectors
        run: python3 python/MCP/verify_laws.py /tmp/golden_vectors.json

      - name: Diff regenerated golden vectors against committed
        run: |
          python3 -c "
          import json
          committed = json.loads(open('Documentation/golden_vectors.json').read())
          regenerated = json.loads(open('/tmp/golden_vectors.json').read())
          assert committed['anchors'] == regenerated['anchors'], 'anchors mismatch'
          assert len(committed['encode_basis']) == len(regenerated['encode_basis']), 'encode_basis length mismatch'
          assert len(committed['syndrome_basis']) == len(regenerated['syndrome_basis']), 'syndrome_basis length mismatch'
          for i, (c, r) in enumerate(zip(committed['encode_basis'], regenerated['encode_basis'])):
              assert c['frame'].lower() == r['frame'].lower(), f'encode_basis[{i}] mismatch: {c[\"frame\"]} != {r[\"frame\"]}'
          for i, (c, r) in enumerate(zip(committed['syndrome_basis'], regenerated['syndrome_basis'])):
              assert int(c['syndrome']) == int(r['syndrome']), f'syndrome_basis[{i}] mismatch: {c[\"syndrome\"]} != {r[\"syndrome\"]}'
          print('golden_vectors.json: committed and regenerated match')
          "

      - name: Run certify_sdk self-test
        run: python3 python/MCP/certify_sdk.py --selftest

      - name: Run MCP self-test
        run: python3 python/MCP/wirelab_mcp.py --selftest

      - name: Run DCF-Radio + dcf-rec unit tests (no ffmpeg needed)
        run: python3 -m unittest python/tests/test_radio.py python/tests/test_dcf_rec.py -v

      - name: SuperPack — self-test, regenerate vectors, diff the committed copies
        run: |
          python3 python/MCP/superpack.py
          python3 python/MCP/gen_superpack_vectors.py /tmp/superpack_vectors.json
          diff /tmp/superpack_vectors.json   Documentation/superpack_vectors.json
          diff /tmp/superpack_vectors.json   python/MCP/superpack_vectors.json
          diff /tmp/superpack_vectors.gen.h  codec/superpack_vectors.gen.h

      - name: FEC — regenerate Reed-Solomon vectors, diff the committed copies, test
        run: |
          python3 python/MCP/gen_fec_vectors.py /tmp/fec_vectors.json
          diff /tmp/fec_vectors.json   Documentation/fec_vectors.json
          diff /tmp/fec_vectors.json   python/MCP/fec_vectors.json
          diff /tmp/fec_vectors.gen.h  codec/fec_vectors.gen.h
          python3 -m unittest python/tests/test_fec.py -v

      - name: SDR/IQ + acoustic + egress + transport/bridge — loopback tests + smokes
        run: |
          python3 -m unittest python/tests/test_iq_loopback.py python/tests/test_acoustic.py \
                              python/tests/test_egress.py python/tests/test_transport.py \
                              python/tests/test_bridge.py -v
          python3 python/dcf/bridge.py --demo
          for mod in gfsk msk fsk4; do
            python3 python/modem/sdr.py tx --text "DCF!" --mod $mod --iq /tmp/d.cf32
            python3 python/modem/sdr.py rx --iq /tmp/d.cf32 --mod $mod | tee /tmp/rx.txt
            grep -q "44434621" /tmp/rx.txt && echo "dcf-sdr $mod cf32 round-trip: recovered \"DCF!\""
          done
          python3 python/modem/acoustic.py tx --text "DCF!" --profile handheld --wav /tmp/a.wav
          python3 python/modem/acoustic.py rx --profile handheld --wav /tmp/a.wav | tee /tmp/arx.txt
          grep -q "44434621" /tmp/arx.txt && echo "acoustic WAV round-trip: recovered \"DCF!\""
          python3 python/modem/uplink_demo.py >/dev/null && echo "uplink_demo: ok"

      - name: Modulation — self-test, regenerate vectors, diff the committed copies
        run: |
          python3 python/MCP/modulationlab_core.py
          python3 python/MCP/gen_modulation_vectors.py /tmp/modulation_vectors.json
          diff /tmp/modulation_vectors.json   Documentation/modulation_vectors.json
          diff /tmp/modulation_vectors.json   python/MCP/modulation_vectors.json
          diff /tmp/modulation_vectors.gen.h  codec/modulation_vectors.gen.h

      - name: Mesh — self-test, regenerate vectors, diff the committed copies
        run: |
          python3 python/MCP/meshlab_core.py
          python3 python/MCP/gen_mesh_vectors.py /tmp/mesh_vectors.json
          diff /tmp/mesh_vectors.json   Documentation/mesh_vectors.json
          diff /tmp/mesh_vectors.json   python/MCP/mesh_vectors.json
          diff /tmp/mesh_vectors.gen.h  codec/mesh_vectors.gen.h

  certify-c:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build C certification test
        run: |
          mkdir -p build && cd build
          gcc -std=c11 -Wall -Wextra -I../codec -o wire_certify ../C_SDK/tests/test_wire_certify.c -lm

      - name: Run C wire certification
        run: build/wire_certify

      - name: Build and run C SuperPack certification
        run: |
          gcc -std=c11 -Wall -Wextra -I codec -o /tmp/test_superpack_certify C_SDK/tests/test_superpack_certify.c -lm
          /tmp/test_superpack_certify

      - name: Build and run C FEC (Reed-Solomon) certification
        run: |
          gcc -std=c11 -Wall -Wextra -I codec -o /tmp/test_fec_certify C_SDK/tests/test_fec_certify.c
          /tmp/test_fec_certify

      - name: Build and run C modulation + mesh certification + node/modem (cmake)
        run: |
          gcc -std=c11 -Wall -Wextra -I codec -o /tmp/test_modulation_certify C_SDK/tests/test_modulation_certify.c
          /tmp/test_modulation_certify
          gcc -std=c11 -Wall -Wextra -I codec -o /tmp/test_mesh_certify C_SDK/tests/test_mesh_certify.c
          /tmp/test_mesh_certify
          cmake -S C_SDK -B /tmp/cbuild -DDCF_BUILD_NODE=ON -DDCF_BUILD_TESTS=ON -DDCF_BUILD_EXAMPLES=OFF
          cmake --build /tmp/cbuild --target dcfnode test_proto_certify test_modulation_certify test_mesh_certify test_modem_loopback test_modem_fec
          ctest --test-dir /tmp/cbuild -R "proto_certify|modulation_certify|mesh_certify|modem_loopback|modem_fec" --output-on-failure

  certify-hydramodem:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: HydraModem — full suite (unit/fuzz/stream/channel/loopback) + sanitizers
        run: |
          cd hydramodem
          make check
          make asan

      - name: HydraModem — DCF interop (a real DeModFrame survives TX->RX byte-exact)
        run: |
          cd hydramodem/dcf-tools
          ./build.sh
          ./build/dcf_loopback

      - name: HydraModem — Faust DSP compile-check (only if faust is available)
        continue-on-error: true
        run: |
          if command -v faust >/dev/null 2>&1; then cd hydramodem && make validate; else echo "faust not installed; skipping"; fi

  certify-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust wire certification
        working-directory: codec
        run: |
          cargo test --test certify
          cargo test --test certify_superpack
          cargo test --test certify_modulation
          cargo test --test certify_mesh
          cargo test --test certify_fec

  certify-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build the WASM codec
        run: |
          wasm-pack build codec-wasm --target web --out-dir ../web/src/wasm --out-name dcf_codec_wasm
          node web/scripts/inline-wasm.mjs

      - name: Certify WASM is byte-identical to the golden vectors
        run: node web/certify/certify_wasm.mjs

  certify-audio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Regenerate audio vectors and diff against committed
        run: |
          python3 python/MCP/gen_audio_vectors.py /tmp/audio_vectors.json
          diff /tmp/audio_vectors.json    Documentation/audio_vectors.json
          diff /tmp/pm_param_vectors.json Documentation/pm_param_vectors.json
          diff /tmp/audio_vectors.gen.h   codec/audio_vectors.gen.h
          echo "audio vectors: committed == regenerated"

      - name: Build and run C audio certification (L2-only)
        run: |
          gcc -std=c11 -Wall -Wextra -I codec \
            -o /tmp/test_audio_certify C_SDK/tests/test_audio_certify.c -lm
          /tmp/test_audio_certify

      - name: Run Rust audio certification
        working-directory: codec
        run: cargo test --test certify_audio

      - name: Regenerate Faust C and diff (only if faust is available)
        continue-on-error: true
        run: |
          if command -v faust >/dev/null 2>&1; then
            faust -lang c -cn DcfPmCodec codec/faust/dcf_pm_codec.dsp -o /tmp/dcf_pm_faust.c
            diff /tmp/dcf_pm_faust.c codec/faust/dcf_pm_faust.c \
              && echo "Faust C: committed == regenerated"
            faust -lang c -cn DcfRfModulator codec/faust/dcf_rf_modulator.dsp -o /tmp/dcf_rf_modulator.gen.c
            diff /tmp/dcf_rf_modulator.gen.c codec/faust/dcf_rf_modulator.gen.c \
              && echo "Faust RF modulator C: committed == regenerated"
          else
            echo "faust not installed — skipping Faust regeneration check"
          fi

  certify-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Regenerate game vectors and diff against committed
        run: |
          python3 python/MCP/gen_game_vectors.py /tmp/game_vectors.json
          diff /tmp/game_vectors.json    Documentation/game_vectors.json
          diff /tmp/game_vectors.json    python/MCP/game_vectors.json
          diff /tmp/game_vectors.gen.h   codec/game_vectors.gen.h
          echo "game vectors: committed == regenerated"

      - name: Build and run C game certification (L2-only)
        run: |
          gcc -std=c11 -Wall -Wextra -I codec \
            -o /tmp/test_game_certify C_SDK/tests/test_game_certify.c -lm
          /tmp/test_game_certify

      - name: Run Rust game certification
        working-directory: codec
        run: cargo test --test certify_game

  certify-text:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Regenerate text vectors and diff against committed
        run: |
          python3 python/MCP/gen_text_vectors.py /tmp/text_vectors.json
          diff /tmp/text_vectors.json    Documentation/text_vectors.json
          diff /tmp/text_vectors.json    python/MCP/text_vectors.json
          diff /tmp/text_vectors.gen.h   codec/text_vectors.gen.h
          echo "text vectors: committed == regenerated"

      - name: Build and run C text certification (L2-only)
        run: |
          gcc -std=c11 -Wall -Wextra -I codec \
            -o /tmp/test_text_certify C_SDK/tests/test_text_certify.c -lm
          /tmp/test_text_certify

      - name: Run Rust text certification
        working-directory: codec
        run: cargo test --test certify_text

  certify-lua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua 5.4
        run: sudo apt-get update && sudo apt-get install -y lua5.4

      - name: Certify the Lua DCF-Audio framework
        run: lua5.4 lua/selftest.lua

      - name: Certify the Lua SuperPack container
        run: lua5.4 lua/dcf_superpack.lua

      - name: Certify the Lua FEC adapter
        run: lua5.4 lua/dcf_fec.lua

      - name: Smoke the rendezvous CLI
        run: lua5.4 lua/dcf_jam.lua --passphrase ci-jam --codec pcm --blocks 20

  certify-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Vet the Go SDK
        working-directory: go
        run: go vet ./...

      - name: Certify the Go SDK (wire codec + game/audio/text adapters + UDP node)
        working-directory: go
        run: go test ./... -v

      - name: Race-check the UDP node
        working-directory: go
        run: go test -race ./node/

  certify-haskell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up GHC and Cabal
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.4'
          cabal-version: '3.10'

      - name: Certify the Haskell DeModFrame codec against the golden vectors
        working-directory: haskell
        run: cabal test --test-show-details=direct

  certify-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Certify the Java DeModFrame codec against the golden vectors
        run: |
          javac -d /tmp/jout java/com/demod/dcf/Frame.java java/com/demod/dcf/Certify.java \
            java/com/demod/dcf/SuperPack.java java/com/demod/dcf/SuperPackCertify.java \
            java/com/demod/dcf/FEC.java java/com/demod/dcf/FECCertify.java
          java -cp /tmp/jout com.demod.dcf.Certify Documentation/golden_vectors.json
          java -cp /tmp/jout com.demod.dcf.SuperPackCertify Documentation/superpack_vectors.json
          java -cp /tmp/jout com.demod.dcf.FECCertify Documentation/fec_vectors.json

  certify-kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Kotlin
        uses: fwilhe2/setup-kotlin@main

      - name: Certify the Kotlin DeModFrame codec against the golden vectors
        run: |
          kotlinc kotlin/src/main/kotlin/dcf/Frame.kt kotlin/src/main/kotlin/dcf/SuperPack.kt kotlin/src/main/kotlin/dcf/FEC.kt kotlin/src/main/kotlin/dcf/Certify.kt -include-runtime -d /tmp/kcert.jar
          java -cp /tmp/kcert.jar dcf.CertifyKt Documentation/golden_vectors.json

  certify-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Certify the Node.js DeModFrame codec against the golden vectors
        run: node JS/nodejs/test/certify.js

      - name: Certify the Node.js SuperPack container
        run: node JS/nodejs/test/certify_superpack.js

      - name: Certify the Node.js FEC adapter
        run: node JS/nodejs/test/certify_fec.js

  certify-perl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.38'

      - name: Certify the Perl DeModFrame codec against the golden vectors
        working-directory: perl
        run: |
          perl Makefile.PL
          make test

  certify-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Certify the C++ DeModFrame codec against the golden vectors
        run: |
          g++ -std=c++17 -Wall -Wextra -I cpp/include -o /tmp/cpp_certify cpp/tests/certify.cpp
          /tmp/cpp_certify Documentation/golden_vectors.json

      - name: Certify the C++ SuperPack container
        run: |
          g++ -std=c++17 -Wall -Wextra -I cpp/include -o /tmp/cpp_superpack cpp/tests/certify_superpack.cpp
          /tmp/cpp_superpack

      - name: Certify the C++ FEC adapter
        run: |
          g++ -std=c++17 -Wall -Wextra -I cpp/include -o /tmp/cpp_fec cpp/tests/certify_fec.cpp
          /tmp/cpp_fec

  certify-swift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '5.10'

      - name: Certify the Swift DeModFrame codec against the golden vectors
        working-directory: swift
        run: swift test

  certify-lisp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL
        run: sudo apt-get update && sudo apt-get install -y sbcl

      - name: Certify the Lisp DeModFrame wire codec (dependency-free, no Quicklisp)
        run: sbcl --non-interactive --load lisp/src/wire.lisp --load lisp/src/fec.lisp